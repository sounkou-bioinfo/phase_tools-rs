name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install R for README generation
        uses: r-lib/actions/setup-r@v2

      - name: Install README generation dependency
        shell: bash
        run: Rscript -e 'install.packages("knitr", repos = "https://cloud.r-project.org")'

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check Rust formatting
        shell: bash
        run: cargo fmt --check

      - name: Show explicit test fixtures
        shell: bash
        run: |
          find tests/fixtures -type f -maxdepth 1 -print | sort
          sed -n '1,20p' tests/fixtures/phased_mnv.expected.body.vcf

      - name: Build Rust release/static where supported
        shell: bash
        run: make static-release

      - name: Locate Rust binary
        id: rust-bin
        shell: bash
        run: |
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            host=$(rustc -vV | sed -n 's/^host: //p')
            bin="target/${host}/release/phase_mnv_rs"
            phase_compare="target/${host}/release/phase_compare"
          else
            bin="target/release/phase_mnv_rs"
            phase_compare="target/release/phase_compare"
          fi
          test -x "$bin"
          test -x "$phase_compare"
          echo "path=$bin" >> "$GITHUB_OUTPUT"
          echo "phase_compare=$phase_compare" >> "$GITHUB_OUTPUT"
          file "$bin" "$phase_compare"
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            ldd "$bin" || true
            ldd "$phase_compare" || true
          else
            otool -L "$bin"
            otool -L "$phase_compare"
          fi

      - name: Test Rust binary
        shell: bash
        run: |
          ./tests/test_phase_mnv.sh "${{ steps.rust-bin.outputs.path }}"
          ./tests/test_output_formats.sh "${{ steps.rust-bin.outputs.path }}"
          ./tests/test_bcftools_norm.sh "${{ steps.rust-bin.outputs.path }}"
          ./tests/test_all_sites.sh "${{ steps.rust-bin.outputs.path }}"
          ./tests/test_bam_phase.sh "${{ steps.rust-bin.outputs.path }}"
          ./tests/test_phase_compare.sh "${{ steps.rust-bin.outputs.phase_compare }}"
          ./tests/test_negative.sh "${{ steps.rust-bin.outputs.path }}"

      - name: Build C static/bundled-htslib binary
        shell: bash
        run: ./scripts/build_c_static.sh

      - name: Inspect C binary
        shell: bash
        run: |
          file c/phase_mnv
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            ldd c/phase_mnv || true
          else
            otool -L c/phase_mnv
          fi

      - name: Test C binary
        shell: bash
        run: |
          ./tests/test_phase_mnv.sh c/phase_mnv
          ./tests/test_negative.sh c/phase_mnv

      - name: Check generated README is up to date
        shell: bash
        run: make check-readme

      - name: Check Rust/C byte identity on synthetic fixture
        shell: bash
        run: ./tests/byte_identical_synthetic.sh "${{ steps.rust-bin.outputs.path }}" c/phase_mnv

      - name: Set up micromamba with WhatsHap
        if: runner.os == 'Linux'
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: phase-mnv-whatshap
          create-args: >-
            -c conda-forge
            -c bioconda
            whatshap=2.8
            bcftools
            samtools
          cache-environment: true

      - name: Compare with WhatsHap using native phase_compare
        if: runner.os == 'Linux'
        shell: bash
        run: make compare-whatshap-phase

      - name: Package binaries
        shell: bash
        run: |
          mkdir -p dist-ci
          suffix="$(printf '%s-%s' "$RUNNER_OS" "$RUNNER_ARCH" | tr '[:upper:]' '[:lower:]')"
          cp "${{ steps.rust-bin.outputs.path }}" "dist-ci/phase_mnv_rs-${suffix}"
          cp "${{ steps.rust-bin.outputs.phase_compare }}" "dist-ci/phase_compare-${suffix}"
          cp c/phase_mnv "dist-ci/phase_mnv_c-${suffix}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum dist-ci/* > "dist-ci/SHA256SUMS-${suffix}.txt"
          else
            shasum -a 256 dist-ci/* > "dist-ci/SHA256SUMS-${suffix}.txt"
          fi
          cat "dist-ci/SHA256SUMS-${suffix}.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase_mnv-${{ runner.os }}-${{ runner.arch }}
          path: dist-ci/*
